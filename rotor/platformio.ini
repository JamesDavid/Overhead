; Overhead Companion Rotor — alt/az pointer firmware (spec rotor/Overhead_Rotor_Spec.md).
; Standalone PlatformIO project (build from this dir, or `pio run -d rotor`).
;
; Target: plain ESP32 WROOM devkit. Arduino-ESP32 core 3.x is REQUIRED — the ESP-NOW
; RX callback uses esp_now_recv_info_t (§12). We reach it via the pioarduino platform
; (same core the CrowPanel env uses). Build in an isolated core dir to avoid clashing
; with the dashboard's registry espressif32 package namespace:
;   set PLATFORMIO_CORE_DIR=...\.platformio-crowpanel   (reuses the installed 3.x core)
;   IMPORTANT: launch with that core dir's OWN penv platformio.exe (Python 3.11) —
;   the registry launcher auto-updated to 3.12 and dies on a littlefs native-ext mismatch.
;
; ONE web-configurable firmware. Motor type (28BYJ/ULN2003 or NEMA/STEP-DIR), pins,
; switches, and ESP-NOW channel are set in the browser (the always-on Rotor-setup AP)
; and stored in NVS — config.h only supplies the factory DEFAULTS (28BYJ). Flash it:
;   pio run -d rotor -e rotor            (-> docs/rotor-flasher/, served on GitHub Pages)
; (A NEMA-default image, if you want the factory defaults flipped, builds with the flag
;  below; you don't need it — just switch motor type in the web UI.)
;
; DEFERRED (§10.2): the include path to the shared contract assumes rotor/ sits beside
; shared/ at the monorepo root (shared_include.py). Adjust during integration if it moves.

[platformio]
default_envs = rotor

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    waspinator/AccelStepper @ ^1.64
; shared_include.py adds the monorepo root to CPPPATH -> #include "shared/telemetry.h"
extra_scripts = pre:shared_include.py

[env:rotor]
; Single firmware; ships with 28BYJ factory defaults, reconfigured in the browser.
; For a NEMA-default image instead: build_flags = -D ROTOR_PRESET_NEMA
