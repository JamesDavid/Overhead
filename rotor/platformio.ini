; Overhead Companion Rotor — alt/az pointer firmware (spec rotor/Overhead_Rotor_Spec.md).
; Standalone PlatformIO project (build from this dir, or `pio run -d rotor`).
;
; Target: plain ESP32 WROOM devkit. Arduino-ESP32 core 3.x is REQUIRED — the ESP-NOW
; RX callback uses esp_now_recv_info_t (§12). We reach it via the pioarduino platform
; (same core the CrowPanel env uses). Build in an isolated core dir to avoid clashing
; with the dashboard's registry espressif32 package namespace:
;   set PLATFORMIO_CORE_DIR=...\.platformio-crowpanel   (reuses the installed 3.x core)
;
; DEFERRED (§10.2): the include path to the shared contract (-I .., below) assumes rotor/
; sits beside shared/ at the monorepo root. Adjust during integration if the tree moves.

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    waspinator/AccelStepper @ ^1.64
; shared_include.py adds the monorepo root to CPPPATH -> #include "shared/telemetry.h"
extra_scripts = pre:shared_include.py
